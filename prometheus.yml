global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'anubis'
    static_configs:
      - targets: [ 'https://ci2.netdef.org/' ]
    metrics_path: /anubis

  - job_name: 'netdef_ci_github_app'
    static_configs:
      - targets: ['localhost:4667']
    metrics_path: /metrics